<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>婚宴座位查詢系統</title>

<style>
body{
font-family:Microsoft JhengHei,sans-serif;
background:#f8f4f1;
margin:0;
padding:20px;
text-align:center;
}

h1{
color:#8c6b4f;
}

input{
width:80%;
max-width:400px;
padding:12px;
font-size:18px;
border:1px solid #ccc;
border-radius:10px;
}

button{
padding:12px 25px;
font-size:18px;
background:#b99267;
color:white;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

#result{
margin-top:25px;
font-size:24px;
font-weight:bold;
}

.arrived{
color:green;
}

.notarrived{
color:red;
}

.hall{
  margin-top:40px;
}

.table{
width:130px;
height:130px;
border-radius:50%;
border:5px solid #d4af37;
background:white;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
font-size:22px;
font-weight:bold;
}

.main{
grid-column:2;
width:160px;
height:160px;
}
</style>

</head>
<body>

<h1>婚宴座位查詢系統</h1>

<input id="searchName" placeholder="請輸入姓名">
<br><br>
<button onclick="findGuest()">查詢座位</button>

<div id="result"></div>

<div class="hall">

  <div style="text-align:center;margin-bottom:80px;">
    <div class="table" id="table1">
      <div>1</div>
      <div>蒙福桌</div>
    </div>
  </div>

  <div style="display:flex;justify-content:space-between;margin:50px;">
    <div class="table" id="table3">
      <div>3</div>
      <div>家宴桌</div>
    </div>

    <div class="table" id="table2">
      <div>2</div>
      <div>永恆桌</div>
    </div>
  </div>

  <div style="display:flex;justify-content:space-between;margin:50px;">
    <div class="table" id="table4">
      <div>4</div>
      <div>眷愛桌</div>
    </div>

    <div class="table" id="table5">
      <div>5</div>
      <div>勇士桌</div>
    </div>
  </div>

  <div style="display:flex;justify-content:space-around;margin-top:80px;">
    <div class="table" id="table6">
      <div>6</div>
      <div>時光桌</div>
    </div>

    <div class="table" id="table7">
      <div>7</div>
      <div>同心桌</div>
    </div>

    <div class="table" id="table8">
      <div>8</div>
      <div>旅程桌</div>
    </div>
  </div>

</div>
<script>

let guests=[];

fetch("guests.json")
.then(res=>res.json())
.then(data=>{
guests=data;
});

function findGuest(){

let name=document.getElementById("searchName").value.trim();

let guest=guests.find(g=>g.name===name);

if(!guest){
document.getElementById("result").innerHTML="查無資料";
return;
}

let status=guest.checkedIn
?'<span class="arrived">🟢 已到場</span>'
:'<span class="notarrived">🔴 未到場</span>';

document.getElementById("result").innerHTML=
`
${guest.name}<br>
桌位：${guest.table}號 ${guest.tableName}<br>
${status}
`;
}

</script>

</body>
</html>
