button{

<body>

<h1>婚宴座位查詢系統</h1>

<input id="searchName" placeholder="請輸入姓名">
<br><br>
<button onclick="findGuest()">查詢座位</button>

<div id="result"></div>
<div class="hall">

  <div style="text-align:center;margin-bottom:80px;">

  </div>

<div style="display:flex;justify-content:space-between;margin:50px;">
    <div class="table" id="table3">

  </div>

<div style="display:flex;justify-content:space-between;margin:50px;">
    <div class="table" id="table4">

      <div>眷愛桌</div>
    </div>

    <div class="table" id="table5">

      <div>勇士桌</div>
    </div>
  </div>

  <div style="display:flex;justify-content:space-around;margin-top:80px;">
    <div class="table" id="table6">

    </div>

    </div>

    <div class="table" id="table8">
      <div>8</div>
      <div>旅程桌</div>
    </div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";
import {
  getDatabase,
  ref,
  set,
  get
} from "https://www.gstatic.com/firebasejs/12.0.0/firebase-database.js";
const firebaseConfig = {
  apiKey: "AIzaSyBzOpsVAcKlrhjzed79LOCwss4WLcu50n0",
  authDomain: "s20260627-96401.firebaseapp.com",
  databaseURL: "https://s20260627-96401-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "s20260627-96401",
  storageBucket: "s20260627-96401.firebasestorage.app",
  messagingSenderId: "738740962399",
  appId: "1:738740962399:web:0d7405a154c06e306b47ea"

const app = initializeApp(firebaseConfig);

  set(
    ref(db,"test"),

<script>

let guests=[];
fetch("guests.json")
.then(res=>res.json())
.then(data=>{
    guests=data;
});


function findGuest(){

let name=document.getElementById("searchName").value.trim();

let guest=guests.find(g=>g.name===name);

if(!guest){
document.getElementById("result").innerHTML="查無資料";
return;
}

let status=guest.checkedIn
?'<span class="arrived">🟢 已到場</span>'
:'<span class="notarrived">🔴 未到場</span>';
let checkinBtn = guest.checkedIn
? ''
: `<button onclick="checkIn('${guest.name}')"
style="
margin-top:12px;
padding:10px 20px;
background:#b08b6d;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
">
我要簽到
</button>`;
document.getElementById("result").innerHTML=
`
<div style="font-size:30px;color:red;">
⬇ 您的位置 ⬇
</div>

${guest.name}<br>
桌位：${guest.table}號 ${guest.tableName}<br>
${status}<br>
${checkinBtn}
`;

document.querySelectorAll(".table").forEach(t=>{
    t.style.background="#e7dddd";
    t.style.border="6px solid #f4f4f4";
});

let target=document.getElementById("table"+guest.table);

if(target){
    target.style.background="#ffd6d6";
    target.style.border="12px solid red";
    target.style.transform="scale(1.35)";
    target.scrollIntoView({
        behavior:"smooth",
        block:"center"
});
}

    
async function checkIn(name){

const guest = guests.find(g => g.name === name);

if(!guest) return;

await set(
    ref(db,"rsvp/"+guest.id),
    {
        id: guest.id,
        name: guest.name,
        table: guest.table,
        tableName: guest.tableName,
        checkinTime: Date.now()
    }
);

guest.checkedIn = true;

alert("簽到成功");

findGuest();

}




</script>

</body>
</html>
