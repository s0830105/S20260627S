<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>婚宴座位查詢系統</title>

<style>
body{
    font-family:"Microsoft JhengHei",sans-serif;
    background:#faf7f2;
    text-align:center;
    padding:20px;
}

h1{
    color:#7d5a50;
}

input{
    width:300px;
    max-width:90%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
}

button{
    margin-top:10px;
    padding:12px 24px;
    background:#b08b6d;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}

#suggestions{
    max-width:400px;
    margin:auto;
    text-align:left;
}

.suggestion{
    background:white;
    margin:5px 0;
    padding:10px;
    border-radius:6px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    font-size:22px;
}
</style>

</head>
<body>

<h1>婚宴座位查詢系統</h1>

<input
id="searchName"
placeholder="請輸入姓名">

<br>

<button onclick="findGuest()">
查詢座位
</button>

<div id="suggestions"></div>

<div id="result"></div>

<script>

let guests=[];

fetch("guests.json")
.then(res=>res.json())
.then(data=>{
    guests=data;
});

function findGuest(){

    const name=
    document.getElementById("searchName")
    .value
    .trim();

    const guest=
    guests.find(g=>g.name===name);

    if(!guest){
        document.getElementById("result")
        .innerHTML="查無資料";
        return;
    }

    document.getElementById("result")
    .innerHTML=
    `
    <h2>${guest.name}</h2>

    桌位：
    ${guest.table}號桌

    ${guest.tableName}
    `;
}

</script>

</body>
</html>
